services:
  imp-server:
    build:
      context: .
      args:
        CUDA_ARCHITECTURES: "${CUDA_ARCHITECTURES:-90a;100;120a}"
    image: imp:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "${IMP_PORT:-8080}:${IMP_PORT:-8080}"
    volumes:
      - ${IMP_MODELS_DIR:-./models}:/models
    environment:
      - IMP_MODEL=${IMP_MODEL:-}
      - IMP_HOST=0.0.0.0
      - IMP_PORT=${IMP_PORT:-8080}
      - IMP_MAX_TOKENS=${IMP_MAX_TOKENS:-}
      - IMP_CHAT_TEMPLATE=${IMP_CHAT_TEMPLATE:-auto}
      - IMP_KV_FP8=${IMP_KV_FP8:-}
      - IMP_KV_INT8=${IMP_KV_INT8:-}
      - IMP_DECODE_NVFP4=${IMP_DECODE_NVFP4:-}
      - IMP_NO_CUDA_GRAPHS=${IMP_NO_CUDA_GRAPHS:-}
      - IMP_SSM_FP16=${IMP_SSM_FP16:-}
      - IMP_MMPROJ=${IMP_MMPROJ:-}
      - IMP_PREFILL_CHUNK_SIZE=${IMP_PREFILL_CHUNK_SIZE:-}
      - IMP_THINK_BUDGET=${IMP_THINK_BUDGET:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${IMP_PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://imp-server:${IMP_PORT:-8080}/v1
      - OPENAI_API_KEY=not-needed
      - WEBUI_AUTH=false
      - ENABLE_OLLAMA_API=false
    depends_on:
      imp-server:
        condition: service_healthy

  imp-pull:
    image: python:3.13-slim
    volumes:
      - ${IMP_MODELS_DIR:-./models}:/models
      - .:/app
    working_dir: /app/scripts
    entrypoint: ["/bin/sh", "-c", "pip install -q huggingface_hub && python3 imp-pull.py \"$@\"", "--"]
    profiles: ["tools"]

volumes:
  open-webui:
