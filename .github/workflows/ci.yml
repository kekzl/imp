name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (CUDA ${{ matrix.cuda }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cuda: ['13.1']
        build_type: [Release]

    container:
      image: nvidia/cuda:${{ matrix.cuda }}.0-devel-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake g++ git python3

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DIMP_BUILD_TESTS=ON \
            -DIMP_BUILD_TOOLS=ON \
            -DIMP_BUILD_BENCH=ON \
            -DCMAKE_CUDA_ARCHITECTURES="90a;100;120"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imp-build-cuda${{ matrix.cuda }}
          path: |
            build/imp-cli
            build/imp-bench
            build/imp-tests
            build/libimp.a

  test:
    name: Test
    needs: build
    runs-on: ubuntu-24.04
    # GPU tests require self-hosted runner with NVIDIA GPU.
    # Uncomment the line below and remove ubuntu-24.04 when a GPU runner is available.
    # runs-on: [self-hosted, gpu, cuda]
    if: false  # Skip until GPU runner is configured

    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: imp-build-cuda13.1
          path: build/

      - name: Run tests
        run: |
          chmod +x build/imp-tests
          cd build && ctest --output-on-failure
