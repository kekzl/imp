# imp model presets — RTX 5090 (32 GB GDDR7)
#
# Copy to ~/.config/imp/presets.toml to customize.
# Or place next to the imp-cli / imp-server binary.
#
# [defaults] values are inherited by all presets.
# Each preset overrides only what differs.
# detect = glob patterns matched against the model filename (case-insensitive).
# First matching preset wins — order matters!

[defaults]
gpu_layers = -1
kv_cache_dtype = "fp8_e4m3"
use_nvfp4_decode = 2
use_fp8_prefill = 1
enable_cuda_graphs = 1
enable_pdl = 1
temperature = 0.6
top_p = 0.95
top_k = 0

# ── Top-5 flagship models ───────────────────────────────────────────

[qwen3-coder-next]
description = "Qwen3-Coder-Next (80B MoE, 3B active)"
detect = ["*qwen3*coder*next*", "*qwen3*coder*moe*"]
max_seq_len = 65536
max_batch_size = 1
top_k = 20

[qwen3-32b]
description = "Qwen3-32B (dense)"
detect = ["*qwen3*32b*"]
max_seq_len = 131072
max_batch_size = 4
top_k = 20

[glm-4.7-flash]
description = "GLM-4.7-Flash (30B MoE, 3B active)"
detect = ["*glm*4.7*", "*glm*47*"]
max_seq_len = 131072
max_batch_size = 1
enable_speculative = 1
spec_k = 3

[deepseek-r1-32b]
description = "DeepSeek-R1-Distill-Qwen-32B (dense)"
detect = ["*deepseek*r1*"]
max_seq_len = 65536
max_batch_size = 1

[mimo-v2-flash]
description = "MiMo-V2-Flash (~7B dense)"
detect = ["*mimo*v2*", "*mimo*flash*"]
max_seq_len = 262144
max_batch_size = 16

# ── Qwen3 family ────────────────────────────────────────────────────

[qwen3-8b]
description = "Qwen3-8B (dense)"
detect = ["*qwen3*8b*"]
max_seq_len = 131072
max_batch_size = 8
top_k = 20

[qwen3-4b]
description = "Qwen3-4B (dense)"
detect = ["*qwen3*4b*"]
max_seq_len = 131072
max_batch_size = 16
top_k = 20

[qwen3-moe]
description = "Qwen3-MoE"
detect = ["*qwen3*moe*"]
max_seq_len = 65536
max_batch_size = 1
top_k = 20

# ── Qwen3-Coder dense variants ──────────────────────────────────────

[qwen3-coder-14b]
description = "Qwen3-Coder-14B (dense, code)"
detect = ["*qwen3*coder*14b*"]
max_seq_len = 131072
max_batch_size = 8
top_k = 20

# ── Gemma-3 (text + vision) ─────────────────────────────────────────

[gemma3-27b]
